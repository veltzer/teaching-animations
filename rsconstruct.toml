[dependencies]
system = [
	# manim renders mp4 with ffmpeg
	"ffmpeg",
	# manim-voiceover uses sox to compute audio durations
	"sox",
	# manim's text and vector rendering backend
	"libcairo2-dev",
	"libpango1.0-dev",
	"pkg-config",
	# required for manim's Tex(...) and MathTex(...) mobjects
	"texlive-latex-base",
	"texlive-fonts-recommended",
	"texlive-latex-extra",
]
pip = [
	# manim-voiceover does `import pkg_resources` at module top level, which
	# lives in setuptools. setuptools is no longer bundled on Python 3.12+,
	# so we install it explicitly here so `rsconstruct tools install-deps`
	# puts it in place before any `manim` invocation.
	"setuptools<82",
	# scripts/build_animation.py invokes `manim` as a subprocess, so the
	# static AST analyzer can't see the dependency. Declare them explicitly
	# so they land on the runner's $PATH / site-packages.
	"manim",
	"manim_voiceover",
  "manim-voiceover[gtts]",
]

[processor.script.manim]
command = "scripts/build_animation.py"
src_extensions = [".py"]
src_dirs = ["animations"]
batch = true

[processor.ruff]
src_dirs = ["scripts", "animations"]

[processor.requirements]
src_dirs = ["scripts", "animations"]
# manim-voiceover does `import pkg_resources` at module top level, which
# lives in setuptools. setuptools is no longer bundled on Python 3.12+,
# and manim-voiceover's metadata does not declare it. Static AST scanning
# can't see that, so we list it here.
extra = ["setuptools"]

[analyzer.python]
