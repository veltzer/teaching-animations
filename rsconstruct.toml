[dependencies]
system = [
	# manim renders mp4 with ffmpeg
	"ffmpeg",
	# manim-voiceover uses sox to compute audio durations
	"sox",
	# manim's text and vector rendering backend
	"libcairo2-dev",
	"libpango1.0-dev",
	"pkg-config",
	# required for manim's Tex(...) and MathTex(...) mobjects
	"texlive-latex-base",
	"texlive-fonts-recommended",
	"texlive-latex-extra",
]

[processor.script.manim]
command = "scripts/build_animation.py"
src_extensions = [".py"]
src_dirs = ["animations"]
batch = true

[processor.ruff]
src_dirs = ["scripts", "animations"]

[processor.requirements]
src_dirs = ["scripts", "animations"]
# manim-voiceover does `import pkg_resources` at module top level, which
# lives in setuptools. setuptools is no longer bundled on Python 3.12+,
# and manim-voiceover's metadata does not declare it. Static AST scanning
# can't see that, so we list it here.
extra = ["setuptools"]

[analyzer.python]
