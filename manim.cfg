# Final mp4s land directly in _site/animations/, named via -o on the
# render command line. Intermediate junk (Tex, text rasters, partial
# movie chunks, logs) goes to a scratch directory that is gitignored
# and never published. Engaged by passing --custom_folders to manim.
[custom_folders]
media_dir = .manim_scratch
video_dir = _site/animations
sections_dir = .manim_scratch/sections
images_dir = .manim_scratch/images
text_dir = .manim_scratch/texts
tex_dir = .manim_scratch/tex
log_dir = .manim_scratch/logs
partial_movie_dir = .manim_scratch/partial/{scene_name}
